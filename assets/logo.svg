<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#3a7bd5"/>
    </linearGradient>
  </defs>
  <!-- 背景圆 -->
  <circle cx="100" cy="100" r="95" fill="url(#bg)" stroke="#00d2ff" stroke-width="2"/>
  <!-- ReAct循环环 -->
  <circle cx="100" cy="100" r="60" fill="none" stroke="url(#ring)" stroke-width="3" stroke-dasharray="8,4" opacity="0.6"/>
  <circle cx="100" cy="100" r="40" fill="none" stroke="url(#ring)" stroke-width="2" stroke-dasharray="4,4" opacity="0.4"/>
  <!-- 核心节点 -->
  <circle cx="100" cy="100" r="18" fill="#00d2ff" opacity="0.9"/>
  <text x="100" y="108" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#fff">R</text>
  <!-- 三个环绕节点代表 Think-Act-Observe -->
  <circle cx="100" cy="42" r="10" fill="#3a7bd5" opacity="0.8"/>
  <text x="100" y="47" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#fff">Think</text>
  <circle cx="148" cy="122" r="10" fill="#3a7bd5" opacity="0.8"/>
  <text x="148" y="127" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#fff">Act</text>
  <circle cx="52" cy="122" r="10" fill="#3a7bd5" opacity="0.8"/>
  <text x="52" y="127" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#fff">Observe</text>
  <!-- 连接线 -->
  <line x1="100" y1="60" x2="100" y2="82" stroke="#00d2ff" stroke-width="1" opacity="0.5"/>
  <line x1="135" y1="112" x2="118" y2="105" stroke="#00d2ff" stroke-width="1" opacity="0.5"/>
  <line x1="65" y1="112" x2="82" y2="105" stroke="#00d2ff" stroke-width="1" opacity="0.5"/>
</svg>