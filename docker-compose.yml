

# 不要run all
services:
  # 1. ChromaDB 向量数据库服务
  chromadb:
    image: chromadb/chroma:latest
    container_name: agent_chromadb
    ports:
      - "8000:8000"
    volumes:
      # 将容器内的数据库持久化到宿主机的 ./chroma_data 文件夹 [cite: 45]
      - ./chroma_data:/chroma/chroma
    restart: unless-stopped

  # 2. Ollama Embedding 模型服务
  ollama:
    image: ollama/ollama:latest
    container_name: agent_ollama
    ports:
      - "11434:11434"
    volumes:
      # 将下载的模型权重持久化，防止容器重启后重新下载
      - ./ollama_data:/root/.ollama
    restart: unless-stopped

  mini_embed:
    build: ./mini_embed
    container_name: agent_mini_embed
    ports:
      - "11435:11435"
    volumes:
      - ./model_cache:/root/.cache/fastembed
      # 新增这一行：将本地的 main.py 直接映射到容器内的 /app/main.py
      - ./mini_embed/main.py:/app/main.py
    restart: unless-stopped